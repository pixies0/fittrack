{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
  Plano | FitTrack
{% endblock %}

{% block page_title %}
  <h1>Planos</h1>
{% endblock %}

{% block content %}
  <div class="plano-page">
    <div class="page-header">
      <div>
        <h2>
          {% if object %}
            Editar Plano
          {% else %}
            Novo Plano
          {% endif %}
        </h2>
      </div>
    </div>

    <form method="post" class="form">
      {% csrf_token %}

      <div class="form-section">{{ form|crispy }}</div>

      <div class="form-footer">
        <button type="button" class="btn btn-outline">Cancelar</button>

        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i>

          Salvar
        </button>
      </div>
    </form>
  </div>
{% endblock %}
